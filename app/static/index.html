<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>NotebookLM YT Studio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📓%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { brand: { 50:'#eef2ff',100:'#e0e7ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca' } } } } };
</script>
<style>
  html, body { height: 100%; }
  body { -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); }
  .video-thumb { aspect-ratio: 16 / 9; }
  .scroll-shadow { background: linear-gradient(white 30%, rgba(255,255,255,0)), linear-gradient(rgba(255,255,255,0), white 70%) 0 100%, radial-gradient(50% 0, farthest-side, rgba(0,0,0,.12), rgba(0,0,0,0)), radial-gradient(50% 100%, farthest-side, rgba(0,0,0,.12), rgba(0,0,0,0)) 0 100%; background-repeat: no-repeat; background-color: white; background-size: 100% 24px, 100% 24px, 100% 8px, 100% 8px; background-attachment: local, local, scroll, scroll; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

<!-- Token gate -->
<div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 px-6">
  <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
    <div class="mb-4 flex items-center gap-2">
      <span class="text-3xl">📓</span>
      <h1 class="text-xl font-semibold">NotebookLM YT</h1>
    </div>
    <p class="mb-3 text-sm text-slate-600">Erişim token'ını gir. Token, Render env var <code class="rounded bg-slate-100 px-1">APP_TOKEN</code>.</p>
    <input id="token-input" type="password" autocomplete="off" placeholder="Bearer token"
      class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
    <button id="token-submit" class="mt-3 w-full rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-700 active:bg-brand-700">
      Giriş yap
    </button>
    <p id="token-error" class="mt-2 hidden text-sm text-red-600"></p>
  </div>
</div>

<!-- App shell -->
<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
  <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2">
      <span class="text-2xl">📓</span>
      <h1 class="text-base font-semibold">NotebookLM YT</h1>
    </div>
    <button id="logout" class="rounded-md px-2.5 py-1 text-xs text-slate-500 hover:bg-slate-100">Çıkış</button>
  </div>
  <nav class="mx-auto flex max-w-3xl gap-1 overflow-x-auto px-4 pb-2">
    <button data-tab="search" class="tab-btn shrink-0 rounded-full px-3 py-1.5 text-sm font-medium">🔍 YouTube</button>
    <button data-tab="web" class="tab-btn shrink-0 rounded-full px-3 py-1.5 text-sm font-medium">🌐 Web</button>
    <button data-tab="notebook" class="tab-btn shrink-0 rounded-full px-3 py-1.5 text-sm font-medium">📚 Defterler</button>
    <button data-tab="generate" class="tab-btn shrink-0 rounded-full px-3 py-1.5 text-sm font-medium">✨ Üret</button>
  </nav>
</header>

<main class="mx-auto max-w-3xl px-4 py-4 pb-32">

  <!-- TAB: SEARCH -->
  <section data-tab-panel="search" class="space-y-4">
    <div class="flex gap-2">
      <input id="search-input" type="search" placeholder="YouTube'da ara…"
        class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
      <button id="search-btn" class="rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-700">Ara</button>
    </div>
    <div class="flex items-center justify-between text-xs text-slate-500">
      <label class="flex items-center gap-1.5 cursor-pointer">
        <input id="search-dates" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-brand-600" />
        <span>Tarihleri göster</span>
      </label>
      <span id="search-status"></span>
    </div>
    <ul id="search-results" class="space-y-3"></ul>
  </section>

  <!-- TAB: WEB -->
  <section data-tab-panel="web" class="hidden space-y-4">
    <div class="flex gap-2">
      <input id="web-input" type="search" placeholder="Web'de ara…"
        class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
      <button id="web-btn" class="rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-700">Ara</button>
    </div>
    <div class="text-xs text-slate-500"><span id="web-status"></span></div>
    <ul id="web-results" class="space-y-3"></ul>
  </section>

  <!-- TAB: NOTEBOOK -->
  <section data-tab-panel="notebook" class="hidden space-y-4">
    <div class="rounded-xl border border-slate-200 bg-white p-4">
      <h2 class="mb-2 text-sm font-semibold">Yeni defter oluştur</h2>
      <div class="flex gap-2">
        <input id="new-nb-title" placeholder="Defter adı" class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" />
        <button id="new-nb-btn" class="rounded-lg bg-brand-600 px-4 py-2 text-sm font-medium text-white">Oluştur</button>
      </div>
    </div>
    <div class="rounded-xl border border-slate-200 bg-white p-4">
      <div class="mb-2 flex items-center justify-between">
        <h2 class="text-sm font-semibold">Defterlerim</h2>
        <button id="reload-nb" class="text-xs text-brand-600 hover:underline">Yenile</button>
      </div>
      <ul id="notebook-list" class="space-y-2 text-sm"></ul>
    </div>
  </section>

  <!-- TAB: GENERATE -->
  <section data-tab-panel="generate" class="hidden space-y-4">
    <div class="rounded-xl border border-slate-200 bg-white p-4">
      <h2 class="mb-2 text-sm font-semibold">Defter</h2>
      <select id="gen-notebook" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <option value="">— Defter seç —</option>
      </select>
      <div id="gen-sources" class="mt-2 text-xs text-slate-500"></div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-4">
      <h2 class="mb-3 text-sm font-semibold">İçerik üret</h2>
      <div class="grid grid-cols-2 gap-2">
        <button data-gen="audio" class="gen-btn rounded-lg border border-slate-200 px-3 py-3 text-sm font-medium hover:bg-slate-50">🎙️ Podcast</button>
        <button data-gen="report" class="gen-btn rounded-lg border border-slate-200 px-3 py-3 text-sm font-medium hover:bg-slate-50">📄 Rapor</button>
        <button data-gen="quiz" class="gen-btn rounded-lg border border-slate-200 px-3 py-3 text-sm font-medium hover:bg-slate-50">❓ Quiz</button>
        <button data-gen="mind_map" class="gen-btn rounded-lg border border-slate-200 px-3 py-3 text-sm font-medium hover:bg-slate-50">🧠 Zihin Haritası</button>
        <button data-gen="slide_deck" class="gen-btn col-span-2 rounded-lg border border-slate-200 px-3 py-3 text-sm font-medium hover:bg-slate-50">📊 Slayt Sunumu (PDF)</button>
      </div>
      <details class="mt-3">
        <summary class="cursor-pointer text-xs text-slate-500">Gelişmiş seçenekler</summary>
        <div class="mt-3 space-y-2 text-sm">
          <label class="block">
            <span class="text-xs text-slate-600">Podcast formatı</span>
            <select id="audio-format" class="mt-1 w-full rounded border border-slate-300 px-2 py-1.5 text-sm">
              <option value="">varsayılan</option>
              <option value="deep_dive">Deep Dive</option>
              <option value="brief">Brief</option>
              <option value="critique">Critique</option>
              <option value="debate">Debate</option>
            </select>
          </label>
          <label class="block">
            <span class="text-xs text-slate-600">Podcast uzunluğu</span>
            <select id="audio-length" class="mt-1 w-full rounded border border-slate-300 px-2 py-1.5 text-sm">
              <option value="">varsayılan</option>
              <option value="short">Kısa</option>
              <option value="default">Orta</option>
              <option value="long">Uzun</option>
            </select>
          </label>
          <label class="block">
            <span class="text-xs text-slate-600">Rapor formatı</span>
            <select id="report-format" class="mt-1 w-full rounded border border-slate-300 px-2 py-1.5 text-sm">
              <option value="briefing_doc">Briefing Doc</option>
              <option value="study_guide">Study Guide</option>
              <option value="blog_post">Blog Post</option>
            </select>
          </label>
          <label class="block">
            <span class="text-xs text-slate-600">Yönerge (opsiyonel)</span>
            <textarea id="gen-instructions" rows="2" class="mt-1 w-full rounded border border-slate-300 px-2 py-1.5 text-sm" placeholder="Örn: Türkçe ve özet odaklı olsun"></textarea>
          </label>
        </div>
      </details>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-4">
      <div class="mb-2 flex items-center justify-between">
        <h2 class="text-sm font-semibold">Üretilenler</h2>
        <button id="reload-art" class="text-xs text-brand-600 hover:underline">Yenile</button>
      </div>
      <ul id="artifact-list" class="space-y-2 text-sm"></ul>
    </div>
  </section>

</main>

<!-- Floating action: send selected videos -->
<div id="fab" class="fixed bottom-4 left-1/2 z-40 hidden -translate-x-1/2">
  <button id="send-btn" class="flex items-center gap-2 rounded-full bg-brand-600 px-5 py-3 text-sm font-medium text-white shadow-lg hover:bg-brand-700 active:scale-95">
    <span id="fab-count">0</span> videoyu deftere ekle →
  </button>
</div>

<!-- Modal: pick notebook -->
<div id="pick-nb-modal" class="fixed inset-0 z-50 hidden items-end justify-center bg-black/50 sm:items-center">
  <div class="w-full max-w-md rounded-t-2xl bg-white p-5 sm:rounded-2xl">
    <h2 class="mb-3 text-base font-semibold">Hangi deftere eklensin?</h2>
    <select id="pick-nb-select" class="mb-3 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></select>
    <div class="mb-3 text-xs text-slate-500">veya yeni oluştur:</div>
    <div class="mb-4 flex gap-2">
      <input id="pick-nb-new" placeholder="Yeni defter adı" class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" />
      <button id="pick-nb-create" class="rounded-lg bg-slate-200 px-3 text-sm">+ Oluştur</button>
    </div>
    <div class="flex gap-2">
      <button id="pick-nb-cancel" class="flex-1 rounded-lg border border-slate-300 px-4 py-2.5 text-sm">İptal</button>
      <button id="pick-nb-confirm" class="flex-1 rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-medium text-white">Ekle</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-20 left-1/2 z-50 hidden -translate-x-1/2 rounded-lg bg-slate-900 px-4 py-2 text-sm text-white shadow-lg"></div>

<!-- Viewer modal -->
<div id="viewer-modal" class="fixed inset-0 z-50 hidden bg-black/70">
  <div class="flex h-full flex-col">
    <div class="flex items-center justify-between bg-slate-900 px-4 py-3 text-white">
      <h2 id="viewer-title" class="truncate text-sm font-semibold"></h2>
      <div class="flex items-center gap-2">
        <button id="viewer-download" class="rounded bg-brand-600 px-3 py-1 text-xs">İndir</button>
        <button id="viewer-close" class="rounded bg-slate-700 px-3 py-1 text-xs">Kapat</button>
      </div>
    </div>
    <div id="viewer-body" class="flex-1 overflow-auto bg-white"></div>
  </div>
</div>

<!-- Marked CDN for MD rendering (loaded once) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
